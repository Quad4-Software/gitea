APP_NAME = $APP_NAME
RUN_USER = $RUN_USER
RUN_MODE = $RUN_MODE

[repository]
ROOT = $GITEA_WORK_DIR/git/repositories

[repository.local]
LOCAL_COPY_PATH = $GITEA_TEMP/local-repo

[repository.upload]
TEMP_PATH = $GITEA_TEMP/uploads

[server]
APP_DATA_PATH = $GITEA_WORK_DIR
SSH_DOMAIN       = $SSH_DOMAIN
HTTP_PORT        = $HTTP_PORT
ROOT_URL         = $ROOT_URL
DISABLE_SSH      = $DISABLE_SSH
; In rootless gitea container only internal ssh server is supported
START_SSH_SERVER = true
SSH_PORT         = $SSH_PORT
SSH_LISTEN_PORT  = $SSH_LISTEN_PORT
BUILTIN_SSH_SERVER_USER = $RUN_USER
LFS_START_SERVER = $LFS_START_SERVER

[database]
PATH = $GITEA_WORK_DIR/data/gitea.db
DB_TYPE = $DB_TYPE
HOST    = $DB_HOST
NAME    = $DB_NAME
USER    = $DB_USER
PASSWD  = $DB_PASSWD

[session]
PROVIDER_CONFIG = $GITEA_WORK_DIR/data/sessions

[picture]
AVATAR_UPLOAD_PATH = $GITEA_WORK_DIR/data/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = $GITEA_WORK_DIR/data/repo-avatars

[attachment]
PATH = $GITEA_WORK_DIR/data/attachments

[log]
ROOT_PATH = $GITEA_WORK_DIR/data/log

[security]
INSTALL_LOCK = $INSTALL_LOCK
SECRET_KEY   = $SECRET_KEY

[service]
DISABLE_REGISTRATION = $DISABLE_REGISTRATION
REQUIRE_SIGNIN_VIEW  = $REQUIRE_SIGNIN_VIEW

[reticulum]
; Enable Git over Reticulum (rngit) integration.
; ENABLED = false
; Reticulum repositories destination hash from `rngit --print-identity`.
; DESTINATION_HASH =
; Directory for Gitea-managed rngit configuration.
; CONFIG_PATH =
; Optional separate Reticulum configuration directory.
; RNS_CONFIG_PATH =
; Path to the rngit executable.
; RNGIT_PATH = rngit
; Start rngit as a subprocess managed by Gitea.
; START_BUILTIN_SERVER = false
; Write rngit .allowed permission files from Gitea repository visibility.
; SYNC_PERMISSIONS = true
; Allow anonymous read access to public repositories over Reticulum.
; PUBLIC_READ = true
; Allow anonymous push access to public repositories over Reticulum.
; PUBLIC_WRITE = false
; Enable Nomad Network page node in rngit.
; SERVE_NOMADNET = false
; Show rngit Thanks counts alongside Gitea stars.
; SHOW_RETICULUM_THANKS = true
; Periodically read {repo}.thanks files into the database.
; SYNC_RETICULUM_THANKS = true
; NODE_NAME = Gitea

[lfs]
PATH = $GITEA_WORK_DIR/git/lfs
