name: release-manual

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (empty = nightly-YYYY-MM-DD)'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: true
      linux_archs:
        description: 'Comma-separated xgo Linux targets'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      publish_image:
        description: 'Publish Docker images to GHCR'
        required: false
        type: boolean
        default: true
  push:
    tags: ['v*']

concurrency:
  group: release-manual-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gitea-reticulum

jobs:
  release-binaries:
    if: github.repository != 'go-gitea/gitea'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="nightly-$(date -u +%Y-%m-%d)"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: ./.github/actions/node-setup

      - run: make deps-frontend deps-backend

      - name: Build Linux release binaries
        env:
          TAGS: bindata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.linux_archs }}" ]; then
            export LINUX_ARCHS="${{ inputs.linux_archs }}"
          else
            export LINUX_ARCHS="linux/amd64,linux/arm64,linux/arm-6,linux/riscv64"
          fi
          make release-linux release-copy release-compress release-check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          ARGS=(--title "$TAG" --notes "Automated release for $TAG at ${GITHUB_SHA::7}")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "$TAG" "${ARGS[@]}" dist/release/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@bb3fbbda2880c2c0c4e5fbfbd1ced37a6ea8e77a # v4.6.0
        with:
          name: release-${{ steps.tag.outputs.value }}
          path: dist/release/*
          if-no-files-found: error

  publish-image:
    if: github.repository != 'go-gitea/gitea' && (github.event_name != 'workflow_dispatch' || inputs.publish_image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
          annotations: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta_rootless
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-rootless
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
          annotations: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=gitea-reticulum-rootful
          cache-to: type=gha,mode=max,scope=gitea-reticulum-rootful

      - name: Build and push rootless image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.rootless
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_rootless.outputs.tags }}
          labels: ${{ steps.meta_rootless.outputs.labels }}
          annotations: ${{ steps.meta_rootless.outputs.annotations }}
          cache-from: type=gha,scope=gitea-reticulum-rootless
          cache-to: type=gha,mode=max,scope=gitea-reticulum-rootless
